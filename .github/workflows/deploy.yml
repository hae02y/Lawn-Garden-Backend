name: Deploy to Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Debug SSH endpoint
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          echo "runner_ip=$(curl -s https://api.ipify.org)"
          echo "ssh_host=$SSH_HOST"
          echo "ssh_port=$SSH_PORT"
          getent hosts "$SSH_HOST" || true
          nc -vz -w 5 "$SSH_HOST" "$SSH_PORT"

      - name: Test SSH connection
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          debug: true
          script: echo connected

      - name: Make Gradle wrapper executable
        run: echo "Using system Gradle on runner"

      - name: Build JAR
        run: gradle clean bootJar -x test

      - name: Verify build artifact
        run: |
          cp build/libs/lawngarden.jar build/libs/lawngarden-${{ github.sha }}.jar
          ls -l build/libs
          sha256sum build/libs/lawngarden-${{ github.sha }}.jar

      - name: Upload JAR to server staging dir
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          source: build/libs/lawngarden-${{ github.sha }}.jar
          target: /home/lawn
          strip_components: 2
          overwrite: true

      - name: Upload application configs
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          source: src/main/resources/application*.yml
          target: /home/lawn
          strip_components: 3
          overwrite: true

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -euo pipefail
            if [ -f /home/lawn/lawngarden.pid ]; then
              kill "$(cat /home/lawn/lawngarden.pid)" || true
              rm -f /home/lawn/lawngarden.pid
            fi
            pkill -f '/home/lawn/lawngarden-.*\.jar' || true

            if [ -f /home/lawn/.env ]; then
              set -a
              . /home/lawn/.env
              set +a
            fi
            jar_path=/home/lawn/lawngarden-${{ github.sha }}.jar
            if [ ! -f "$jar_path" ]; then
              echo "missing jar: $jar_path"
              ls -l /home/lawn/*.jar || true
              exit 1
            fi
            sha256sum "$jar_path"

            previous_jar=""
            for candidate in /home/lawn/lawngarden-*.jar; do
              if [ "$candidate" = "$jar_path" ]; then
                continue
              fi
              if [ -z "$previous_jar" ] || [ "$candidate" -nt "$previous_jar" ]; then
                previous_jar="$candidate"
              fi
            done

            nohup java -jar "$jar_path" --spring.config.additional-location=file:/home/lawn/ > /home/lawn/lawngarden.log 2>&1 &
            new_pid=$!
            echo "$new_pid" > /home/lawn/lawngarden.pid

            startup_ok=false
            for i in $(seq 1 30); do
              if ! kill -0 "$new_pid" 2>/dev/null; then
                echo "application process exited early"
                break
              fi

              if curl -fsS "http://127.0.0.1:8080/v3/api-docs" >/dev/null 2>&1; then
                startup_ok=true
                break
              fi

              sleep 2
            done

            if [ "$startup_ok" != "true" ]; then
              echo "application startup verification failed"
              tail -n 200 /home/lawn/lawngarden.log || true

              if [ -n "$previous_jar" ] && [ -f "$previous_jar" ]; then
                echo "rolling back to previous jar: $previous_jar"
                nohup java -jar "$previous_jar" --spring.config.additional-location=file:/home/lawn/ > /home/lawn/lawngarden.log 2>&1 &
                rollback_pid=$!
                echo "$rollback_pid" > /home/lawn/lawngarden.pid
              else
                echo "no rollback jar available"
              fi

              exit 1
            fi

            echo "application startup verified"

            for old_jar in /home/lawn/lawngarden-*.jar; do
              if [ "$old_jar" != "$jar_path" ]; then
                rm -f "$old_jar"
              fi
            done
            rm -f /home/lawn/lawngarden.jar
