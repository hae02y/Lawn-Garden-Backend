name: Deploy to Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Debug SSH endpoint
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          echo "runner_ip=$(curl -s https://api.ipify.org)"
          echo "ssh_host=$SSH_HOST"
          echo "ssh_port=$SSH_PORT"
          getent hosts "$SSH_HOST" || true
          nc -vz -w 5 "$SSH_HOST" "$SSH_PORT"

      - name: Test SSH connection
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          debug: true
          script: echo connected

      - name: Make Gradle wrapper executable
        run: echo "Using system Gradle on runner"

      - name: Build JAR
        run: gradle clean bootJar -x test

      - name: Verify build artifact
        run: ls -l build/libs

      - name: Upload JAR to server staging dir
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          source: build/libs/*.jar
          target: /home/lawn
          overwrite: true

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            if [ -f /home/lawn/lawngarden.pid ]; then
              kill "$(cat /home/lawn/lawngarden.pid)" || true
              rm -f /home/lawn/lawngarden.pid
            fi
            jar_path=$(ls /home/lawn/*.jar | head -n 1)
            nohup java -jar "$jar_path" > /home/lawn/lawngarden.log 2>&1 &
            echo $! > /home/lawn/lawngarden.pid
